<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RECON</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Roboto:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header class="header-bar">
      <div class="brand">
        <span class="brand-title">RECON</span>
      </div>
      <div class="status-cluster">
        <span id="connection-chip" class="chip chip-muted">…</span>
        <span id="clock" class="chip chip-muted">--:--:--</span>
      </div>
    </header>

    <main class="grid">
      <section class="panel panel-camera">
        <div class="panel-header">
          <span class="panel-title">Video</span>
          <span class="panel-meta" id="camera-meta">—</span>
        </div>
        <div class="camera-wrap">
          <img id="camera-feed" alt="camera feed" />
          <div class="scanlines"></div>
          <div class="camera-placeholder">No signal</div>
        </div>
      </section>

      <section id="right-column" class="right-column">
        <div class="panel panel-map">
          <div class="panel-header">
            <span class="panel-title">SLAM Map</span>
            <span class="panel-meta" id="map-meta">—</span>
          </div>
          <div class="canvas-wrap">
            <canvas id="tactical-map"></canvas>
            <div class="legend">
              <span><i class="dot dot-cyan"></i>Robot</span>
              <span><i class="dot dot-green"></i>Confirmed</span>
              <span><i class="dot dot-amber"></i>Radar</span>
              <span><i class="dot dot-red"></i>Threat</span>
            </div>
          </div>
        </div>

        <div class="panel panel-intel">
          <div class="panel-header">
            <span class="panel-title">Intel</span>
            <span class="panel-meta" id="intel-meta">—</span>
          </div>
          <div id="vlm-plan" class="vlm-plan" hidden>
            <div class="vlm-plan-action">
              <span class="vlm-plan-label">Next</span>
              <span id="vlm-plan-action">—</span>
            </div>
            <div class="vlm-plan-rationale" id="vlm-plan-rationale"></div>
          </div>
          <div id="intel-feed" class="intel-list"></div>
        </div>

        <div class="panel panel-telemetry">
          <div class="panel-header">
            <span class="panel-title">Sensors</span>
            <span class="panel-meta" id="telemetry-meta">—</span>
          </div>
          <div id="telemetry-feed" class="telemetry-feed"></div>
        </div>
      </section>

      <div id="evacuation-banner" class="evacuation-banner" hidden>
        <div class="evacuation-icon">&#9888;</div>
        <div class="evacuation-text">
          <strong>PERSON DETECTED</strong>
          <span>EVACUATION WARNING ACTIVE</span>
        </div>
        <div class="evacuation-count">
          <span id="evac-people-count">0</span> person(s)
        </div>

        <div class="panel panel-log">
          <div class="panel-header">
            <span class="panel-title">Log</span>
          </div>
          <ul id="defusal-log" class="action-log"></ul>
        </div>

        <div class="panel panel-controls">
          <div class="panel-header">
            <span class="panel-title">Controls</span>
            <span class="panel-meta" id="controls-meta">Standby</span>
          </div>
          <div class="control-grid" id="defusal-controls">
            <button type="button" class="btn btn-red" disabled data-defusal-action="CUT_RED">
              Cut red
            </button>
            <button type="button" class="btn btn-blue" disabled data-defusal-action="CUT_BLUE">
              Cut blue
            </button>
            <button type="button" class="btn btn-green" disabled data-defusal-action="CUT_GREEN">
              Cut green
            </button>
            <button type="button" class="btn btn-amber" disabled data-defusal-action="FLIP_SWITCH">
              Flip switch
            </button>
            <button type="button" class="btn btn-abort" disabled data-defusal-action="ABORT">
              Abort
            </button>
          </div>
        </div>
      </section>
    </main>

    <footer class="footer-bar">
      <div class="footer-group">
        <span class="footer-label">Mission</span>
        <span id="mission-phase" class="footer-value">—</span>
      </div>
      <div class="footer-group">
        <span class="footer-label">People</span>
        <span id="people-count" class="footer-value">0</span>
      </div>
      <div class="footer-group">
        <span class="footer-label">Threats</span>
        <span id="threat-count" class="footer-value">0</span>
      </div>
      <div class="footer-group">
        <span class="footer-label">Battery</span>
        <span id="battery-level" class="footer-value">--%</span>
      </div>
      <div class="footer-spacer"></div>
      <div class="footer-group footer-autonomy">
        <span class="footer-label">Autonomy</span>
        <button
          type="button"
          id="autonomy-toggle"
          class="btn-autonomy btn-autonomy-off"
          title="Enable/disable autonomous planner execution"
        >OFF</button>
      </div>
    </footer>

    <script src="adapter.js"></script>
    <script src="mock.js"></script>
    <script src="map.js"></script>
    <script src="intel.js"></script>
    <script src="telemetry.js"></script>
    <script src="defusal.js"></script>
    <script src="app.js"></script>
  </body>
</html>
